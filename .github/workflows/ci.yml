name: Backend CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Security & Extraction Suite
        env:
          # We provide fake keys just so the tests can boot up without crashing
          CLERK_SECRET_KEY: "test_key"
          CLERK_PUBLIC_KEY: "test_key"
          GEMINI_API_KEY: "test_key"
          DATABASE_URL: "postgresql+asyncpg://fake_user:fake_password@localhost:5432/fake_db"
          USE_MOCK_PAYMENTS: "True"
        run: |
          pytest -v
